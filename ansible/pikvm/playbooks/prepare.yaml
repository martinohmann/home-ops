---
- name: Prepare
  hosts: pikvm
  become: true
  gather_facts: true
  any_errors_fatal: true
  pre_tasks:
    - name: Pausing for 2 seconds...
      ansible.builtin.pause:
        seconds: 2

  tasks:
    - name: Switch to Read-Write mode
      ansible.builtin.command:
        cmd: rw

    - name: Install packages
      community.general.pacman:
        name:
          - fzf
          - htop
          - kubectx
          - nut
          - prometheus-node-exporter
          - wakeonlan
        update_cache: true

    - name: kvmd
      ansible.builtin.include_tasks: tasks/kvmd.yaml

    - name: nut
      ansible.builtin.include_tasks: tasks/nut.yaml

    - name: kubernetes
      ansible.builtin.include_tasks: tasks/kubernetes.yaml

    - name: Switch to Read-Only mode
      ansible.builtin.command:
        cmd: ro

  handlers:
    - name: Restart nut services
      ansible.builtin.systemd_service:
        name: "{{ item }}"
        state: restarted
      loop:
        - nut
        - nut-driver
        - nut-monitor

    - name: Restart kvmd service
      ansible.builtin.systemd_service:
        name: kvmd
        state: restarted
